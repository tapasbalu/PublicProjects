name: dbt CI

# Trigger this workflow on every pull request targeting main
on:
  pull_request:
    branches:
      - main

jobs:
  dbt-test:
    name: Run dbt build and test
    runs-on: ubuntu-latest

    env:
      # These are loaded from GitHub Actions Secrets — never hardcoded
      DBT_SNOWFLAKE_ACCOUNT:   ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
      DBT_SNOWFLAKE_USER:      ${{ secrets.DBT_SNOWFLAKE_USER }}
      DBT_SNOWFLAKE_PASSWORD:  ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
      DBT_SNOWFLAKE_ROLE:      ${{ secrets.DBT_SNOWFLAKE_ROLE }}
      DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}
      DBT_SNOWFLAKE_DATABASE:  ${{ secrets.DBT_SNOWFLAKE_DATABASE }}

    steps:
      # Step 1: Check out the code from the PR branch
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dbt-snowflake
      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.11.3

      # Step 4: Write the profiles.yml dynamically from secrets
      # This is the safe way — credentials never touch the repository
      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          tpch_warehouse:
            outputs:
              ci:
                type: snowflake
                account: "${DBT_SNOWFLAKE_ACCOUNT}"
                user: "${DBT_SNOWFLAKE_USER}"
                password: "${DBT_SNOWFLAKE_PASSWORD}"
                role: "${DBT_SNOWFLAKE_ROLE}"
                warehouse: "${DBT_SNOWFLAKE_WAREHOUSE}"
                database: "${DBT_SNOWFLAKE_DATABASE}"
                schema: CI_${{ github.event.pull_request.number }}
                threads: 4
            target: ci
          EOF

      # Step 5: Validate connection
      - name: dbt debug
        working-directory: tpch_warehouse
        run: dbt debug

      # Step 6: Build all models AND run all tests in one command
      # dbt build = dbt run + dbt test in dependency order
      - name: dbt build
        working-directory: tpch_warehouse
        run: dbt build

      # Step 7: Clean up CI schema after tests pass
      - name: Drop CI schema
        working-directory: tpch_warehouse
        if: always()
        run: |
          dbt run-operation drop_schema --args \
            "{schema_name: CI_${{ github.event.pull_request.number }}}"
        continue-on-error: true
