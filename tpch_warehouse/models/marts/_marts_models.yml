version: 2

models:
  - name: fct_orders
    description: "Fact table at the order line-item grain. Central table of the Star Schema."
    columns:
      - name: order_key
        description: "Foreign key to dim_customers via orders."
        tests:
          - not_null

      - name: line_number
        description: "Line number within the order."
        tests:
          - not_null

      - name: customer_key
        description: "Foreign key to dim_customers."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key

      - name: part_key
        description: "Foreign key to dim_parts."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_parts')
                field: part_key

      - name: supplier_key
        description: "Foreign key to dim_suppliers."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_suppliers')
                field: supplier_key

      - name: order_status
        description: "Order status flag."
        tests:
          - accepted_values:
              arguments:
                values: ['O', 'F', 'P']

      - name: net_revenue
        description: "Revenue after discount: extended_price * (1 - discount)."
        tests:
          - not_null

      - name: gross_revenue
        description: "Revenue after discount and tax."
        tests:
          - not_null

  - name: dim_customers
    description: "Customer dimension with fully resolved geography."
    columns:
      - name: customer_key
        description: "Primary key — unique per customer."
        tests:
          - unique
          - not_null

      - name: market_segment
        description: "Customer market segment."
        tests:
          - accepted_values:
              arguments:
                values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'MACHINERY', 'HOUSEHOLD']

      - name: region_name
        description: "Geographic region the customer belongs to."
        tests:
          - accepted_values:
              arguments:
                values: ['AFRICA', 'AMERICA', 'ASIA', 'EUROPE', 'MIDDLE EAST']

  - name: dim_parts
    description: "Product/part dimension."
    columns:
      - name: part_key
        description: "Primary key — unique per part."
        tests:
          - unique
          - not_null

      - name: retail_price
        description: "Retail price of the part."
        tests:
          - not_null

  - name: dim_suppliers
    description: "Supplier dimension with fully resolved geography."
    columns:
      - name: supplier_key
        description: "Primary key — unique per supplier."
        tests:
          - unique
          - not_null

      - name: region_name
        description: "Geographic region the supplier belongs to."
        tests:
          - accepted_values:
              arguments:
                values: ['AFRICA', 'AMERICA', 'ASIA', 'EUROPE', 'MIDDLE EAST']

  - name: dim_locations
    description: "Geographic location dimension — nation and region."
    columns:
      - name: nation_key
        description: "Primary key — unique per nation."
        tests:
          - unique
          - not_null

      - name: region_name
        description: "Region the nation belongs to."
        tests:
          - accepted_values:
              arguments:
                values: ['AFRICA', 'AMERICA', 'ASIA', 'EUROPE', 'MIDDLE EAST']
