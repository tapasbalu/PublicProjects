version: 2

models:
  - name: stg_orders
    description: "Cleaned and renamed orders from the TPCH source."
    columns:
      - name: order_key
        description: "Primary key — unique per order."
        tests:
          - unique
          - not_null

      - name: customer_key
        description: "Foreign key to stg_customer."
        tests:
          - not_null

      - name: order_status
        description: "Current status of the order."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['O', 'F', 'P']

      - name: order_date
        description: "Date the order was placed."
        tests:
          - not_null

  - name: stg_lineitem
    description: "Cleaned line items — one row per product within an order."
    columns:
      - name: order_key
        description: "Foreign key to stg_orders."
        tests:
          - not_null

      - name: line_number
        description: "Line number within the order (part of composite PK)."
        tests:
          - not_null

      - name: part_key
        description: "Foreign key to stg_part."
        tests:
          - not_null

      - name: supplier_key
        description: "Foreign key to stg_supplier."
        tests:
          - not_null

      - name: return_flag
        description: "Whether the item was returned."
        tests:
          - accepted_values:
              arguments:
                values: ['R', 'A', 'N']

      - name: ship_mode
        description: "Method of shipment."
        tests:
          - accepted_values:
              arguments:
                values: ['AIR', 'TRUCK', 'MAIL', 'SHIP', 'REG AIR', 'RAIL', 'FOB']

  - name: stg_customer
    description: "Cleaned customer records."
    columns:
      - name: customer_key
        description: "Primary key — unique per customer."
        tests:
          - unique
          - not_null

      - name: nation_key
        description: "Foreign key to stg_nation."
        tests:
          - not_null

      - name: market_segment
        description: "Customer market segment."
        tests:
          - accepted_values:
              arguments:
                values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'MACHINERY', 'HOUSEHOLD']

  - name: stg_part
    description: "Cleaned product catalog."
    columns:
      - name: part_key
        description: "Primary key — unique per part."
        tests:
          - unique
          - not_null

  - name: stg_supplier
    description: "Cleaned supplier records."
    columns:
      - name: supplier_key
        description: "Primary key — unique per supplier."
        tests:
          - unique
          - not_null

      - name: nation_key
        description: "Foreign key to stg_nation."
        tests:
          - not_null

  - name: stg_nation
    description: "Cleaned nation dimension."
    columns:
      - name: nation_key
        description: "Primary key — unique per nation."
        tests:
          - unique
          - not_null

      - name: region_key
        description: "Foreign key to stg_region."
        tests:
          - not_null

  - name: stg_region
    description: "Cleaned region dimension."
    columns:
      - name: region_key
        description: "Primary key — unique per region."
        tests:
          - unique
          - not_null

      - name: region_name
        description: "Geographic region name."
        tests:
          - accepted_values:
              arguments:
                values: ['AFRICA', 'AMERICA', 'ASIA', 'EUROPE', 'MIDDLE EAST']
